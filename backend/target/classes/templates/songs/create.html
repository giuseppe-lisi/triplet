<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{ fragments/imports :: head }"></div>
    <title>Add Song</title>
</head>

<body class="bg-body-secondary" style="margin-top: 120px;">
    <header>
        <div th:replace="~{ fragments/navbar :: navbar }"></div>
        <div th:replace="~{ fragments/offcanvas :: offcanvas }"></div>
    </header>
    
    <main th:object="${song}">
        <div class="container bg-white rounded-3 p-3 mb-5">
            <h3 class="fw-light">Add a new song</h3>
            <form th:action="@{/songs/create}" method="POST">
                <input type="hidden" name="album" th:value="*{album.id}">
                <label for="title" class="form-label mt-3">Title</label>
                <input type="text" th:field="*{title}" id="title" class="form-control" th:errorClass="is-invalid">
                <div th:if="${#fields.hasErrors('title')}" class="invalid-feedback">
                    <li th:each="err : ${#fields.errors('title')}" th:text="${err}"></li>
                </div>
                <label for="duration" class="form-label mt-3">Duration (mm:ss)</label>
                <input type="text" th:field="*{duration}" id="duration" class="form-control" th:errorClass="is-invalid">
                <div th:if="${#fields.hasErrors('duration')}" class="invalid-feedback">
                    <li th:each="err : ${#fields.errors('duration')}" th:text="${err}"></li>
                </div>
                <label for="ytLink" class="form-label mt-3">Youtube URL</label>
                <input type="text" th:field="*{ytLink}" id="ytLink" class="form-control" th:errorClass="is-invalid">
                <div th:if="${#fields.hasErrors('ytLink')}" class="invalid-feedback">
                    <li th:each="err : ${#fields.errors('ytLink')}" th:text="${err}"></li>
                </div>
                <div class="d-flex mt-3 justify-content-between">
                    <button type="submit" class="btn btn-sm bg-primary-subtle">Create</button>
                    <button type="reset" class="btn btn-sm bg-warning-subtle">Reset</button>
                </div>
            </form>
        </div>
    </main>

    <footer>

    </footer>
    <!-- Bootstrap js -->
    <div th:replace="~{ fragments/imports :: bsScript }"></div>
</body>

</html>
